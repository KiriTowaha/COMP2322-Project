<!DOCTYPE html>
<html lang="en">
<head>

    <title>COMP2322 Home Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;

        <p><a href="https://www.polyu.edu.hk">Visit PolyU Website</a></p>
        <p><a href="./log/server.log">View Log File</a></p>
